<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资讯大盘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="date" id="currentDate"></div>
      <h1 class="greeting" id="greeting"></h1>
    </header>

    <!-- Weather Card -->
    <section class="weather-card" id="weatherCard">
      <div class="weather-main">
        <div class="weather-icon" id="weatherIcon">☀️</div>
        <div class="weather-temp" id="weatherTemp">--°</div>
        <div class="weather-desc" id="weatherDesc">加载中...</div>
      </div>
      <div class="weather-details">
        <span id="weatherLocation">--</span>
        <span id="weatherAQI">--</span>
      </div>
    </section>

    <!-- Stock Card -->
    <section class="stock-card" id="stockCard">
      <div class="stock-header">
        <span class="stock-name">比亚迪 (SZ002594)</span>
        <span class="stock-time" id="stockTime">--:--</span>
      </div>
      <div class="stock-price" id="stockPrice">--.--</div>
      <div class="stock-change" id="stockChange">--%</div>
    </section>

    <!-- Hot Topics -->
    <section class="topics-section">
      <h2 class="section-title">今日热点</h2>
      <div class="topics-list" id="topicsList">
        <div class="topic-item skeleton">
          <div class="skeleton-line w-80"></div>
          <div class="skeleton-line w-60"></div>
        </div>
        <div class="topic-item skeleton">
          <div class="skeleton-line w-70"></div>
          <div class="skeleton-line w-50"></div>
        </div>
        <div class="topic-item skeleton">
          <div class="skeleton-line w-75"></div>
          <div class="skeleton-line w-55"></div>
        </div>
      </div>
    </section>

    <!-- Refresh Button -->
    <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">
      <span class="refresh-icon">↻</span>
      刷新
    </button>
  </div>

  <footer class="footer">
    <span>最后更新: <span id="lastUpdate">--:--:--</span></span>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
